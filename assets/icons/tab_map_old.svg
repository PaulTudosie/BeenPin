<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Mask to remove globe lines behind pin -->
  <defs>
    <mask id="pin-cutout">
      <rect width="24" height="24" fill="white"></rect>
      <circle cx="12" cy="11.5" r="2.2" fill="black"></circle>
    </mask>
  </defs>

  <!-- Globe outline (thinner) -->
  <circle cx="12" cy="11.5" r="9" stroke="black" stroke-width="1.1"></circle>

  <!-- Globe grid (thinner + masked) -->
  <g mask="url(#pin-cutout)" stroke="black" stroke-width="0.8" fill="none">
    <ellipse cx="12" cy="11.5" rx="6" ry="9"></ellipse>
    <ellipse cx="12" cy="11.5" rx="9" ry="4"></ellipse>
  </g>

  <!-- Pin (slightly refined stroke) -->
  <path d="M12 9.8C11.2 9.8 10.6 10.4 10.6 11.2C10.6 12.3 12 14 12 14C12 14 13.4 12.3 13.4 11.2C13.4 10.4 12.8 9.8 12 9.8Z" stroke="black" stroke-width="1" fill="none"></path>

  <circle cx="12" cy="11.2" r="0.5" fill="black"></circle>

</svg>